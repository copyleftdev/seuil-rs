<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seuil playground — JSONata for Rust</title>
  <meta name="description" content="Interactive JSONata expression playground powered by seuil-rs compiled to WebAssembly">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "codemirror": "https://esm.sh/codemirror@6",
      "@codemirror/lang-json": "https://esm.sh/@codemirror/lang-json@6",
      "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6",
      "@codemirror/state": "https://esm.sh/@codemirror/state@6"
    }
  }
  </script>
  <style>
    /* =========================================================================
       DESIGN TOKENS
       ========================================================================= */
    :root {
      --bg-root: #0a0b10;
      --bg-surface: #0f1017;
      --bg-surface-2: #141520;
      --bg-surface-3: #1a1b2e;
      --bg-elevated: #1e1f33;
      --bg-hover: rgba(99, 102, 241, 0.06);

      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.12);
      --border-focus: #6366f1;

      --text-primary: #e8e9f0;
      --text-secondary: #9395a5;
      --text-tertiary: #5d5f72;
      --text-inverse: #0a0b10;

      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-muted: rgba(99, 102, 241, 0.15);
      --accent-glow: rgba(99, 102, 241, 0.25);

      --green: #22c55e;
      --green-muted: rgba(34, 197, 94, 0.12);
      --green-glow: rgba(34, 197, 94, 0.3);

      --red: #ef4444;
      --red-muted: rgba(239, 68, 68, 0.1);
      --red-glow: rgba(239, 68, 68, 0.3);

      --yellow: #eab308;
      --yellow-muted: rgba(234, 179, 8, 0.12);

      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --transition: 200ms var(--ease);
      --transition-fast: 120ms var(--ease);
      --transition-slow: 300ms var(--ease);

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6);

      --header-h: 52px;
      --status-h: 32px;
      --panel-header-h: 38px;
      --divider-w: 5px;
    }

    /* =========================================================================
       RESET + BASE
       ========================================================================= */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-root);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: var(--accent-muted);
      color: var(--text-primary);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

    /* =========================================================================
       HEADER
       ========================================================================= */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 0 20px;
      background: rgba(15, 16, 23, 0.8);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 50%, #c084fc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 15px;
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .logo:hover .logo-mark {
      transform: scale(1.05);
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.5);
    }

    .logo-text {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wasm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-muted);
      border: 1px solid rgba(34, 197, 94, 0.15);
      transition: all var(--transition);
    }

    .wasm-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green-glow); }
      50% { opacity: 0.4; box-shadow: none; }
    }

    .shortcut-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .shortcut-hint kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 5px;
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all var(--transition);
    }

    .header-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .header-link svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    .header-link:hover svg { opacity: 1; }

    /* =========================================================================
       EXAMPLES DROPDOWN
       ========================================================================= */
    .examples-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-sans);
      user-select: none;
    }

    .examples-trigger:hover {
      color: var(--text-primary);
      border-color: var(--border-strong);
      background: var(--bg-surface-3);
    }

    .examples-trigger:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .examples-trigger svg {
      width: 12px;
      height: 12px;
      transition: transform var(--transition);
    }

    .examples-trigger.open svg {
      transform: rotate(180deg);
    }

    .examples-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 199;
    }

    .examples-overlay.open { display: block; }

    .examples-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      opacity: 0;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      width: 420px;
      max-height: 480px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: var(--shadow-xl);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }

    .examples-dropdown.open {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .examples-category {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      position: sticky;
      top: 0;
      background: var(--bg-surface-2);
      z-index: 1;
    }

    .examples-category:not(:first-child) {
      border-top: 1px solid var(--border-subtle);
      margin-top: 4px;
      padding-top: 12px;
    }

    .example-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      margin: 2px 4px;
      transition: background var(--transition-fast);
    }

    .example-item:hover {
      background: var(--accent-muted);
    }

    .example-item:active {
      background: rgba(99, 102, 241, 0.2);
    }

    .example-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .example-desc {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .example-expr {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--accent-hover);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* =========================================================================
       MAIN LAYOUT
       ========================================================================= */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .left-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 280px;
    }

    .divider-v {
      width: var(--divider-w);
      background: var(--bg-root);
      cursor: col-resize;
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .divider-v::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 32px;
      border-radius: 2px;
      background: var(--border-default);
      transition: background var(--transition), height var(--transition);
    }

    .divider-v:hover::after,
    .divider-v.dragging::after {
      background: var(--accent);
      height: 48px;
    }

    .divider-v:hover,
    .divider-v.dragging {
      background: rgba(99, 102, 241, 0.08);
    }

    .divider-h {
      height: var(--divider-w);
      background: var(--bg-root);
      cursor: row-resize;
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .divider-h::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 3px;
      width: 32px;
      border-radius: 2px;
      background: var(--border-default);
      transition: background var(--transition), width var(--transition);
    }

    .divider-h:hover::after,
    .divider-h.dragging::after {
      background: var(--accent);
      width: 48px;
    }

    .divider-h:hover,
    .divider-h.dragging {
      background: rgba(99, 102, 241, 0.08);
    }

    .right-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 280px;
    }

    /* =========================================================================
       PANEL
       ========================================================================= */
    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      background: var(--bg-surface);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--panel-header-h);
      padding: 0 14px;
      background: var(--bg-surface-2);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .panel-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      user-select: none;
    }

    .panel-label-icon {
      width: 14px;
      height: 14px;
      opacity: 0.5;
    }

    .panel-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      background: var(--bg-elevated);
    }

    .panel-body {
      flex: 1;
      overflow: auto;
      position: relative;
      min-height: 0;
    }

    /* CodeMirror container overrides */
    .panel-body .cm-editor {
      height: 100%;
      background: transparent;
    }

    .panel-body .cm-editor .cm-scroller {
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.65;
      padding: 8px 0;
    }

    .panel-body .cm-editor .cm-content {
      padding: 0 8px;
    }

    .panel-body .cm-editor .cm-gutters {
      background: transparent;
      border-right: 1px solid var(--border-subtle);
    }

    .panel-body .cm-editor .cm-activeLineGutter,
    .panel-body .cm-editor .cm-activeLine {
      background: rgba(99, 102, 241, 0.04);
    }

    .panel-body .cm-editor.cm-focused {
      outline: none;
    }

    .panel-body .cm-editor .cm-cursor {
      border-left-color: var(--accent);
    }

    .panel-body .cm-editor .cm-selectionBackground {
      background: rgba(99, 102, 241, 0.2) !important;
    }

    .panel-body .cm-editor.cm-focused .cm-selectionBackground {
      background: rgba(99, 102, 241, 0.25) !important;
    }

    /* =========================================================================
       RESULT PANEL
       ========================================================================= */
    .result-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .result-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .result-dot.success {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }

    .result-dot.error {
      background: var(--red);
      box-shadow: 0 0 6px var(--red-glow);
    }

    .result-dot.evaluating {
      background: var(--yellow);
      animation: pulse-eval 0.6s ease-in-out infinite;
    }

    @keyframes pulse-eval {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .result-timing {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      padding: 2px 6px;
      background: var(--bg-elevated);
      border-radius: 4px;
    }

    .result-lines {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .result-error-container {
      padding: 16px;
      animation: shake 0.3s ease-out;
    }

    .result-error-box {
      background: var(--red-muted);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      color: var(--red);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-error-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--red);
      margin-bottom: 6px;
    }

    .result-error-label svg {
      width: 12px;
      height: 12px;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    @keyframes result-in {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-fade-in {
      animation: result-in 200ms var(--ease) forwards;
    }

    .result-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--text-tertiary);
      font-size: 13px;
      user-select: none;
    }

    .result-empty-state svg {
      width: 32px;
      height: 32px;
      opacity: 0.3;
      margin-bottom: 4px;
    }

    /* =========================================================================
       STATUS BAR
       ========================================================================= */
    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--status-h);
      padding: 0 14px;
      background: var(--bg-surface-2);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .statusbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .statusbar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: all var(--transition);
    }

    .statusbar-dot.ok {
      background: var(--green);
      box-shadow: 0 0 4px var(--green-glow);
    }

    .statusbar-dot.err {
      background: var(--red);
      box-shadow: 0 0 4px var(--red-glow);
    }

    .statusbar-dot.loading {
      background: var(--yellow);
      animation: pulse-eval 0.6s ease-in-out infinite;
    }

    .statusbar-center {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      opacity: 0.7;
    }

    .statusbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* =========================================================================
       RESPONSIVE
       ========================================================================= */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .left-pane, .right-pane {
        min-width: 0;
        min-height: 120px;
      }

      .divider-v {
        display: none;
      }

      .divider-h-mobile {
        height: var(--divider-w);
        background: var(--bg-root);
        cursor: row-resize;
        flex-shrink: 0;
      }

      .shortcut-hint { display: none; }
      .header-link span { display: none; }
      .header-link { padding: 5px 6px; }
      .statusbar-center { display: none; }

      .examples-dropdown {
        width: calc(100vw - 32px);
        left: auto;
        right: -60px;
        transform: translateY(-4px);
      }

      .examples-dropdown.open {
        transform: translateY(0);
      }
    }

    /* =========================================================================
       ACCESSIBILITY
       ========================================================================= */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* =========================================================================
       TOOLTIP STYLES
       ========================================================================= */
    .cm-tooltip-autocomplete {
      background: var(--bg-surface-2) !important;
      border: 1px solid var(--border-default) !important;
      border-radius: var(--radius-sm) !important;
      box-shadow: var(--shadow-lg) !important;
    }

    .cm-tooltip-autocomplete ul li {
      font-family: var(--font-mono) !important;
      font-size: 12px !important;
    }

    .cm-tooltip-autocomplete ul li[aria-selected] {
      background: var(--accent-muted) !important;
      color: var(--text-primary) !important;
    }
  </style>
</head>
<body>

<div class="app">
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <a class="logo" href="#" onclick="return false">
        <div class="logo-mark">s</div>
        <div class="logo-text">
          <span class="logo-name">seuil</span>
          <span class="logo-sub">playground</span>
        </div>
      </a>
      <span class="wasm-badge" id="wasm-badge">
        <span class="wasm-badge-dot"></span>
        WASM
      </span>
    </div>

function seuilCompletions(context) {
  const word = context.matchBefore(/\$\w*/);
  if (!word || (word.from === word.to && !context.explicit)) return null;
  return {
    from: word.from,
    options: SEUIL_FUNCTIONS,
    validFor: /^\$\w*$/,
  };
}

// ============================================================================

function createBaseExtensions() {
  return [
    lineNumbers(),
    highlightActiveLineGutter(),
    highlightActiveLine(),
    highlightSpecialChars(),
    drawSelection(),
    bracketMatching(),
    closeBrackets(),
    indentOnInput(),
    history(),
    foldGutter(),
    highlightSelectionMatches(),
    oneDark,
    seuilTheme,
    keymap.of([
      ...closeBracketsKeymap,
      ...defaultKeymap,
      ...historyKeymap,
      ...foldKeymap,
      ...searchKeymap,
      indentWithTab,
    ]),
  ];
}

function createExprEditor(parent) {
  const view = new EditorView({
    state: EditorState.create({
      doc: DEFAULT_EXPR,
      extensions: [
        ...createBaseExtensions(),
        javascript(),
        autocompletion({
          override: [seuilCompletions],
          activateOnTyping: true,
        }),
        EditorView.updateListener.of((update) => {
          if (update.docChanged) debouncedEval();
        }),
        keymap.of([{
          key: 'Ctrl-Enter',
          mac: 'Cmd-Enter',
          run: () => { runEval(); return true; },
        }]),
        EditorView.lineWrapping,
      ],
    }),
    parent,
  });
  return view;
}

function createDataEditor(parent) {
  const view = new EditorView({
    state: EditorState.create({
      doc: DEFAULT_DATA,
      extensions: [
        ...createBaseExtensions(),
        json(),
        linter(jsonParseLinter()),
        lintGutter(),
        EditorView.updateListener.of((update) => {
          if (update.docChanged) {
            validateJsonInput();
            debouncedEval();
          }
        }),
        keymap.of([{
          key: 'Ctrl-Enter',
          mac: 'Cmd-Enter',
          run: () => { runEval(); return true; },
        }]),
        EditorView.lineWrapping,
      ],
    }),
    parent,
  });
  return view;
}

function createResultEditor(parent) {

      doc: '',
      extensions: [
        ...createBaseExtensions(),
        json(),
        EditorState.readOnly.of(true),
        EditorView.lineWrapping,
      ],

    parent,

}

// ============================================================================
// JSON VALIDATION BADGE
// ============================================================================
function validateJsonInput() {
  if (!dataView) return;
  const text = dataView.state.doc.toString().trim();
  if (!text) {
    $jsonBadge.textContent = 'Empty';
    $jsonBadge.style.color = 'var(--text-tertiary)';
    return;
  }
  try {
    JSON.parse(text);
    $jsonBadge.textContent = 'Valid';
    $jsonBadge.style.color = 'var(--green)';
  } catch {
    $jsonBadge.textContent = 'Invalid';
    $jsonBadge.style.color = 'var(--red)';
  }
}

// ============================================================================
// EVALUATION
// ============================================================================
function setStatus(state, text) {
  $statusbarDot.className = 'statusbar-dot ' + state;
  $statusbarText.textContent = text;
}

function setResultState(state) {
  $resultDot.className = 'result-dot ' + state;
}

function showResult(formatted, elapsed) {
  $resultEmpty.style.display = 'none';
  $resultError.style.display = 'none';
  $resultEditorMount.style.display = 'block';

  // Update result editor content
  if (resultView) {
    resultView.dispatch({
      changes: {
        from: 0,
        to: resultView.state.doc.length,
        insert: formatted,
      },
    });
  }

  // Trigger fade-in animation
  $resultEditorMount.classList.remove('result-fade-in');
  void $resultEditorMount.offsetHeight;
  $resultEditorMount.classList.add('result-fade-in');

  // Timing
  const timeStr = elapsed < 1 ? '<1ms' : Math.round(elapsed) + 'ms';
  $resultTiming.textContent = timeStr;
  $resultTiming.style.display = '';
  $statusbarTiming.textContent = timeStr;

  // Line count
  const lineCount = formatted.split('\n').length;
  $resultLines.textContent = lineCount + ' lines';
  $statusbarLines.textContent = lineCount + 'L';

  setResultState('success');
  setStatus('ok', 'Success');
}

function showError(message) {
  $resultEmpty.style.display = 'none';
  $resultEditorMount.style.display = 'none';
  $resultError.style.display = 'block';
  $resultError.innerHTML = '';

  const container = document.createElement('div');
  container.className = 'result-error-container';

  const label = document.createElement('div');
  label.className = 'result-error-label';
  label.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3"/><circle cx="8" cy="11" r="0.5" fill="currentColor"/></svg> Error';

  const box = document.createElement('div');
  box.className = 'result-error-box';
  box.textContent = message;

  container.appendChild(label);
  container.appendChild(box);
  $resultError.appendChild(container);

  $resultTiming.style.display = 'none';
  $resultLines.textContent = '';
  $statusbarTiming.textContent = '';
  $statusbarLines.textContent = '';

  setResultState('error');
  setStatus('err', 'Error');
}

function showEmpty() {
  $resultEmpty.style.display = '';
  $resultEditorMount.style.display = 'none';
  $resultError.style.display = 'none';
  $resultTiming.style.display = 'none';
  $resultLines.textContent = '';
  $statusbarTiming.textContent = '';
  $statusbarLines.textContent = '';
  setResultState('');
  setStatus('', 'Ready');
}

function runEval() {
  if (!wasmReady) return;

  const expr = exprView ? exprView.state.doc.toString().trim() : '';
  const jsonStr = dataView ? dataView.state.doc.toString().trim() : '';

  if (!expr) {
    showEmpty();
    return;
  }

  setResultState('evaluating');
  setStatus('loading', 'Evaluating...');

  requestAnimationFrame(() => {
    let raw, elapsed;
    try {
      const start = performance.now();
      raw = evaluate(expr, jsonStr);
      elapsed = performance.now() - start;
    } catch (e) {
      console.error('[seuil] evaluate() threw:', e);
      showError('WASM error: ' + e.message);
      return;
    }

    try {
      const result = JSON.parse(raw);
      if (result.ok) {
        const formatted = result.result === undefined
          ? 'undefined'
          : JSON.stringify(result.result, null, 2);
        showResult(formatted, elapsed);
      } else {
        showError(result.error);
        // Still show timing
        const timeStr = elapsed < 1 ? '<1ms' : Math.round(elapsed) + 'ms';
        $statusbarTiming.textContent = timeStr;
      }
    } catch (e) {
      showError(raw || 'Unknown error');
    }
  });
}

function debouncedEval() {
  clearTimeout(evalTimeout);
  evalTimeout = setTimeout(runEval, 150);
}

// ============================================================================
// EXAMPLES DROPDOWN
// ============================================================================
function buildExamplesDropdown() {
  $examplesDropdown.innerHTML = '';
  let currentCat = '';

  for (const ex of EXAMPLES) {
    if (ex.cat !== currentCat) {
      currentCat = ex.cat;
      const catEl = document.createElement('div');
      catEl.className = 'examples-category';
      catEl.textContent = currentCat;
      $examplesDropdown.appendChild(catEl);
    }

    const item = document.createElement('div');
    item.className = 'example-item';
    item.setAttribute('role', 'option');
    item.innerHTML = `
      <div class="example-name">${ex.name}</div>
      <div class="example-desc">${ex.desc}</div>
      <div class="example-expr">${escapeHtml(ex.expr.replace(/\n/g, ' '))}</div>
    `;
    item.addEventListener('click', () => {
      loadExample(ex);
      closeExamples();
    });
    $examplesDropdown.appendChild(item);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function loadExample(ex) {
  if (exprView) {
    exprView.dispatch({
      changes: { from: 0, to: exprView.state.doc.length, insert: ex.expr },
    });
  }
  if (ex.data && dataView) {
    dataView.dispatch({
      changes: { from: 0, to: dataView.state.doc.length, insert: ex.data },
    });
  }
  runEval();
}

function toggleExamples() {
  const isOpen = $examplesDropdown.classList.contains('open');
  if (isOpen) {
    closeExamples();
  } else {
    openExamples();
  }
}

function openExamples() {
  $examplesDropdown.classList.add('open');
  $examplesTrigger.classList.add('open');
  $examplesTrigger.setAttribute('aria-expanded', 'true');
  $examplesOverlay.classList.add('open');
}

function closeExamples() {
  $examplesDropdown.classList.remove('open');
  $examplesTrigger.classList.remove('open');
  $examplesTrigger.setAttribute('aria-expanded', 'false');
  $examplesOverlay.classList.remove('open');
}

$examplesTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleExamples();
});

$examplesOverlay.addEventListener('click', closeExamples);

// Close on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeExamples();
});

// ============================================================================
// RESIZABLE SPLITTERS
// ============================================================================
function setupVerticalDivider() {
  const divider = document.getElementById('divider-v');
  const leftPane = document.getElementById('left-pane');
  const rightPane = document.getElementById('right-pane');
  const main = document.getElementById('main');
  let dragging = false;

  function onMouseDown(e) {
    e.preventDefault();
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }

  function onMouseMove(e) {
    if (!dragging) return;
    const rect = main.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const total = rect.width - 5; // minus divider
    const leftRatio = Math.max(0.2, Math.min(0.8, x / rect.width));
    const rightRatio = 1 - leftRatio;
    leftPane.style.flex = leftRatio.toString();
    rightPane.style.flex = rightRatio.toString();
  }

  function onMouseUp() {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  divider.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function setupHorizontalDivider() {
  const divider = document.getElementById('divider-h');
  const exprPanel = document.getElementById('expr-panel');
  const dataPanel = document.getElementById('data-panel');
  const leftPane = document.getElementById('left-pane');
  let dragging = false;

  function onMouseDown(e) {
    e.preventDefault();
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  }

  function onMouseMove(e) {
    if (!dragging) return;
    const rect = leftPane.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const ratio = Math.max(0.15, Math.min(0.85, y / rect.height));
    exprPanel.style.flex = ratio.toString();
    dataPanel.style.flex = (1 - ratio).toString();
  }

  function onMouseUp() {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  divider.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

// ============================================================================
// KEYBOARD SHORTCUTS
// ============================================================================
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runEval();
  }
});

// ============================================================================
// INIT
// ============================================================================
async function main() {
  setStatus('loading', 'Loading WASM...');
  console.log('[seuil] Initializing playground...');

  // Create editors
  exprView = createExprEditor(document.getElementById('expr-editor-mount'));
  dataView = createDataEditor(document.getElementById('data-editor-mount'));
  resultView = createResultEditor(document.getElementById('result-editor-mount'));

  // Build examples
  buildExamplesDropdown();

  // Set up splitters
  setupVerticalDivider();
  setupHorizontalDivider();

  // Validate initial JSON
  validateJsonInput();

  // Load WASM
  try {
    await init();
    wasmReady = true;
    console.log('[seuil] WASM loaded successfully');
    setStatus('ok', 'Ready');
    runEval();
  } catch (e) {
    console.error('[seuil] WASM load failed:', e);
    setStatus('err', 'Failed to load WASM');
    showError('Failed to load WebAssembly module: ' + e.message + '\n\nMake sure you have run wasm-pack build in the playground crate.\nCheck the browser console for details.');
  }
}

main();
</script>
